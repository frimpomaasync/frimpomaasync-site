name: Deploy frimpomaasync.com to Hostinger
# Every push to main uploads the site to public_html on Hostinger.
# Needs repo secrets: FTP_SERVER / FTP_USERNAME / FTP_PASSWORD
# The FTP root already IS public_html, so server-dir stays ./
#
# DELETION BEHAVIOUR (corrected 2026-07-22 - the previous note here was wrong):
# This action keeps a .ftp-deploy-sync-state.json on the server and DOES delete
# files it previously uploaded, once they leave the repo. Removing Som.zip from
# the repo deleted it from the live server within a minute.
# What it does NOT touch is anything it never uploaded - so the hand-uploaded
# NanaOS folder (os-fad13324c3/) really is safe, just not for the reason the
# old comment gave. If you retire a file people may still hold a link to, add a
# redirect in .htaccess rather than assuming the old URL survives.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/*.bak
